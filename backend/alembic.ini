# A generic, single database configuration.

[alembic]
script_location = %(here)s/alembic

# Prepend backend/ to sys.path so "from app.xxx" works
prepend_sys_path = .

# File naming for migration scripts
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

path_separator = os

# OVERRIDDEN at runtime — see alembic/env.py, which reads settings.database_url
# This placeholder is here only so alembic.ini is valid; it is never actually used
sqlalchemy.url = sqlite:///./student.db


[post_write_hooks]
# Uncomment to auto-format migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
